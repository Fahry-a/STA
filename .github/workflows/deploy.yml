name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

# Deploy is an outward-facing publish, so we don't cancel an in-flight run.
# We gate on the canonical CI workflow (`on: workflow_run` watches ci.yml, named
# `CI` in ci.yml) completing successfully for the same commit on the default
# branch; we still run lint+test inline as a belt-and-suspenders check.
permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify lockfile remains unchanged
        run: git diff --exit-code -- bun.lock

      - name: Type check
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Put PROXY_URLS secret
        run: printf '%s' "${{ secrets.PROXY_URLS }}" | bunx wrangler secret put PROXY_URLS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Put ADMIN_API_KEY secret
        run: printf '%s' "${{ secrets.ADMIN_API_KEY }}" | bunx wrangler secret put ADMIN_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
